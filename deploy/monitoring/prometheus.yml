# Prometheus 监控配置
# 用于FOS系统指标收集和告警

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'fos-gateway'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - fos-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: gateway
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__

  - job_name: 'fos-validator'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - fos-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: validator

  - job_name: 'fos-bus'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - fos-system
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_component]
        action: keep
        regex: bus

# 告警规则
rule_files:
  - 'fos_alerts.yml'

# 告警管理器配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - 'alertmanager:9093'
