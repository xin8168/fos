# FOS 日志配置
# 使用 Fluent Bit 收集和转发日志

[SERVICE]
    Flush        1
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name             tail
    Path             /var/log/containers/fos-*.log
    Parser           docker
    Tag              fos.*
    Refresh_Interval 5
    Mem_Buf_Limit    5MB
    Skip_Long_Lines  On

[FILTER]
    Name                kubernetes
    Match               fos.*
    Kube_URL            https://kubernetes.default.svc:443
    Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
    Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
    Kube_Tag_Prefix     fos.var.log.containers.
    Merge_Log           On
    Merge_Log_Key       log_processed
    K8S-Logging.Parser  On
    K8S-Logging.Exclude Off

[FILTER]
    Name    modify
    Match   fos.*
    Add     environment production
    Add     team fos-team

[OUTPUT]
    Name            es
    Match           fos.*
    Host            elasticsearch-master
    Port            9200
    Logstash_Format On
    Logstash_Prefix fos-logs
    Replace_Dots    On
    Retry_Limit     False

[OUTPUT]
    Name            stdout
    Match           fos.*
    Format          json_lines
