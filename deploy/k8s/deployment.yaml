apiVersion: v1
kind: Namespace
metadata:
  name: fos-system
  labels:
    name: fos-system
    app: fos
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fos-config
  namespace: fos-system
  labels:
    app: fos
data:
  default.toml: |
    [server]
    host = "0.0.0.0"
    port = 8080
    
    [database]
    url = "postgres://fos:fos@fos-postgres:5432/fos"
    max_connections = 10
    
    [logging]
    level = "info"
    format = "json"
    
    [cache]
    max_size = 10000
    ttl_seconds = 3600
    
    [lock]
    timeout_seconds = 30
    wait_timeout_seconds = 10
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fos-gateway
  namespace: fos-system
  labels:
    app: fos
    component: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fos
      component: gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fos
        component: gateway
    spec:
      serviceAccountName: fos-service-account
      containers:
        - name: fos-gateway
          image: fos-platform/fos-gateway:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
            - containerPort: 9090
              name: metrics
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: FOS_CONFIG_PATH
              value: "/app/config/default.toml"
          volumeMounts:
            - name: config-volume
              mountPath: /app/config
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config-volume
          configMap:
            name: fos-config
---
apiVersion: v1
kind: Service
metadata:
  name: fos-gateway
  namespace: fos-system
  labels:
    app: fos
    component: gateway
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: metrics
  selector:
    app: fos
    component: gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fos-validator
  namespace: fos-system
  labels:
    app: fos
    component: validator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fos
      component: validator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fos
        component: validator
    spec:
      containers:
        - name: fos-validator
          image: fos-platform/fos-validator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8081
              name: http
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fos-validator
  namespace: fos-system
  labels:
    app: fos
    component: validator
spec:
  type: ClusterIP
  ports:
    - port: 8081
      targetPort: 8081
      protocol: TCP
      name: http
  selector:
    app: fos
    component: validator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fos-bus
  namespace: fos-system
  labels:
    app: fos
    component: bus
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fos
      component: bus
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: fos
        component: bus
    spec:
      containers:
        - name: fos-bus
          image: fos-platform/fos-bus:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fos-bus
  namespace: fos-system
  labels:
    app: fos
    component: bus
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      protocol: TCP
      name: http
  selector:
    app: fos
    component: bus
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: fos-service-account
  namespace: fos-system
  labels:
    app: fos
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fos-ingress
  namespace: fos-system
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
spec:
  ingressClassName: nginx
  rules:
    - host: fos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: fos-gateway
                port:
                  number: 80
          - path: /api/validator
            pathType: Prefix
            backend:
              service:
                name: fos-validator
                port:
                  number: 8081
          - path: /api/bus
            pathType: Prefix
            backend:
              service:
                name: fos-bus
                port:
                  number: 8082
  tls:
    - hosts:
        - fos.example.com
      secretName: fos-tls-secret
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fos-gateway-hpa
  namespace: fos-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fos-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fos-gateway-pdb
  namespace: fos-system
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: fos
      component: gateway
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: fos-validator-pdb
  namespace: fos-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: fos
      component: validator
