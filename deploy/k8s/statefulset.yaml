# FOS Kubernetes StatefulSet 配置
# 用于需要持久化状态的服务（PostgreSQL, Redis等）

---
# PostgreSQL StatefulSet
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fos-postgres
  namespace: fos-system
  labels:
    app: fos
    component: database
spec:
  serviceName: fos-postgres
  replicas: 1
  selector:
    matchLabels:
      app: fos
      component: database
  template:
    metadata:
      labels:
        app: fos
        component: database
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgres
          image: postgres:15-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: fos
            - name: POSTGRES_USER
              value: fos
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fos-secrets
                  key: postgres-password
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - fos
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - fos
            initialDelaySeconds: 5
            periodSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "standard"
        resources:
          requests:
            storage: 10Gi

---
# PostgreSQL Service
apiVersion: v1
kind: Service
metadata:
  name: fos-postgres
  namespace: fos-system
  labels:
    app: fos
    component: database
spec:
  clusterIP: None
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  selector:
    app: fos
    component: database

---
# Redis StatefulSet (可选，用于缓存)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: fos-redis
  namespace: fos-system
  labels:
    app: fos
    component: cache
spec:
  serviceName: fos-redis
  replicas: 1
  selector:
    matchLabels:
      app: fos
      component: cache
  template:
    metadata:
      labels:
        app: fos
        component: cache
    spec:
      terminationGracePeriodSeconds: 10
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "standard"
        resources:
          requests:
            storage: 1Gi

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: fos-redis
  namespace: fos-system
  labels:
    app: fos
    component: cache
spec:
  clusterIP: None
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
  selector:
    app: fos
    component: cache

---
# PVC for FOS 数据持久化
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fos-eventlog-pvc
  namespace: fos-system
  labels:
    app: fos
    component: eventlog
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: "standard"

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: fos-audit-pvc
  namespace: fos-system
  labels:
    app: fos
    component: audit
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: "standard"

---
# StorageClass for different storage needs
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fos-storage-standard
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-standard
  replication-type: regional-pd
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain

---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fos-storage-ssd
provisioner: kubernetes.io/gce-pd
parameters:
  type: pd-ssd
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain