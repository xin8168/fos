# FOS Cargo 配置

[build]
# 使用所有CPU核心进行并行编译
jobs = -1

[term]
# 彩色输出
color = "auto"
# 进度条
verbose = false

[net]
# 网络重试次数
retry = 5
# 离线模式（可选）
offline = false

[registry]
# 使用 crates.io
default = "crates-io"

[source.crates-io]
# 中国镜像加速（可选）
# replace-with = "ustc"

# 清华大学镜像
[source.ustc]
registry = "https://mirrors.ustc.edu.cn/crates.io-index"

# 字节跳动镜像
[source.rsproxy]
registry = "https://rsproxy.cn/crates.io-index"

[alias]
# 自定义命令别名
xtask = "run --package fos-cli --bin fos-cli --"
check-all = "check --workspace --all-targets"
test-all = "test --workspace --all-targets"
clippy-all = "clippy --workspace --all-targets -- -D warnings"
fmt-all = "fmt --all -- --check"
doc-all = "doc --workspace --no-deps"

# 开发时使用的配置
[profile.dev]
opt-level = 0
debug = true
split-debuginfo = "unpacked"
incremental = true

# 测试时使用的配置
[profile.test]
inherits = "dev"
opt-level = 1

# 发布时使用的配置
[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1
strip = true
panic = "abort"
incremental = false

# 性能测试配置
[profile.bench]
inherits = "release"
debug = true
strip = false
