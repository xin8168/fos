[package]
name = "fos-test-utils"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["FOS Team"]
description = "FOS 测试工具库"
repository = "https://github.com/fos-platform/fos"

[lib]
name = "fos_test_utils"
path = "src/lib.rs"

[dependencies]
tokio = { version = "1.35", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.6", features = ["v4"] }
rand = "0.8"

[dev-dependencies]
tokio-test = "0.4"
